<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用管理システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
  margin:0;
}

h1{
  margin:0 0 20px 0;
  font-size:24px;
}

.wrap{
  background:#fff;
  padding:20px;
  margin-bottom:20px;
}

form{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:flex-end;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.form-group label{
  font-size:13px;
  font-weight:600;
  color:#333;
}

input, select, button{
  padding:10px 12px;
  font-size:14px;
  box-sizing:border-box;
}

input[type="text"], input[type="date"], select{
  min-width:160px;
}

button{
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
  vertical-align:middle;
}

th{
  background:#eee;
}

.action-buttons{
  display:flex;
  gap:8px;
}

.edit-btn{
  background:#f3f3f3;
  border:1px solid #bbb;
}

.delete-btn{
  background:#fff0f0;
  border:1px solid #d88;
}

#cancelEditBtn{
  display:none;
}

.status-text{
  font-weight:600;
}

@media screen and (max-width: 768px){
  form{
    flex-direction:column;
    align-items:stretch;
  }

  input[type="text"], input[type="date"], select, button{
    width:100%;
  }

  .table-wrap{
    overflow-x:auto;
  }

  table{
    min-width:1000px;
  }
}
</style>
</head>
<body>

<h1>採用管理システム</h1>

<div class="wrap">
  <form id="recruitForm">
    <div class="form-group">
      <label for="name">氏名</label>
      <input id="name" type="text" placeholder="例：小溝 進" required>
    </div>

    <div class="form-group">
      <label for="store">店舗</label>
      <select id="store" required></select>
    </div>

    <div class="form-group">
      <label for="source">媒体</label>
      <select id="source">
        <option value="飲食店.com">飲食店.com</option>
        <option value="クックビズ">クックビズ</option>
      </select>
    </div>

    <div class="form-group">
      <label for="status">ステータス</label>
      <select id="status">
        <option value="内定">内定</option>
        <option value="承諾">承諾</option>
        <option value="辞退">辞退</option>
      </select>
    </div>

    <div class="form-group">
      <label for="start_date">入社予定日</label>
      <input type="date" id="start_date">
    </div>

    <div class="form-group">
      <label for="memo">メモ</label>
      <input id="memo" type="text" placeholder="例：入社日不明">
    </div>

    <div class="form-group">
      <label for="submitBtn">操作</label>
      <button type="submit" id="submitBtn">登録</button>
    </div>
  </form>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>氏名</th>
        <th>店舗</th>
        <th>媒体</th>
        <th>ステータス</th>
        <th>入社予定</th>
        <th>メモ</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="recruitList"></tbody>
  </table>
</div>


<script>
const SUPABASE_URL = "https://brzdyerxpjsgltmufhkh.supabase.co";
const SUPABASE_KEY = "sb_publishable_81-lBmd-xm4Ayv9IwGBW5A_DIU-U6a9";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let editingId = null;
let storesCache = [];

async function loadStores(){
  const { data, error } = await client
    .from("stores")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    alert("店舗の読み込みに失敗しました");
    console.error(error);
    return;
  }

  storesCache = data || [];

  const select = document.getElementById("store");
  select.innerHTML = "";

  storesCache.forEach(store => {
    const option = document.createElement("option");
    option.value = store.id;
    option.textContent = store.name;
    select.appendChild(option);
  });
}

function buildStoreOptions(selected){
  return storesCache.map(s=>{
    const sel = Number(selected)===Number(s.id) ? "selected":"";
    return `<option value="${s.id}" ${sel}>${escapeHtml(s.name)}</option>`;
  }).join("");
}

async function loadRecruits(){
  const { data, error } = await client
    .from("recruits")
    .select(`
      id,
      name,
      source,
      status,
      start_date,
      memo,
      store_id,
      stores(name)
    `)
    .order("id", { ascending: false });

  if (error) {
    alert("採用データの読み込みに失敗しました");
    console.error(error);
    return;
  }

  const tbody = document.getElementById("recruitList");
  tbody.innerHTML = "";

  data.forEach(r => {
    const tr = document.createElement("tr");

    if(editingId === r.id){
      tr.innerHTML = `
      <td><input id="edit_name_${r.id}" value="${escapeHtml(r.name||"")}" /></td>
      <td>
        <select id="edit_store_${r.id}">
          ${buildStoreOptions(r.store_id)}
        </select>
      </td>
      <td>
        <select id="edit_source_${r.id}">
          <option ${r.source==="飲食店.com"?"selected":""}>飲食店.com</option>
          <option ${r.source==="クックビズ"?"selected":""}>クックビズ</option>
        </select>
      </td>
      <td>
        <select id="edit_status_${r.id}">
          <option ${r.status==="内定"?"selected":""}>内定</option>
          <option ${r.status==="承諾"?"selected":""}>承諾</option>
          <option ${r.status==="辞退"?"selected":""}>辞退</option>
        </select>
      </td>
      <td>
        <input type="date" id="edit_date_${r.id}" value="${escapeHtml(r.start_date||"")}" />
      </td>
      <td>
        <input id="edit_memo_${r.id}" value="${escapeHtml(r.memo||"")}" />
      </td>
      <td>
        <button onclick="saveEdit(${r.id})">保存</button>
        <button onclick="cancelEdit()">キャンセル</button>
      </td>`;
    }else{
      tr.innerHTML = `
      <td>${escapeHtml(r.name||"")}</td>
      <td>${escapeHtml(r.stores?.name||"")}</td>
      <td>${escapeHtml(r.source||"")}</td>
      <td>${escapeHtml(r.status||"")}</td>
      <td>${escapeHtml(r.start_date||"")}</td>
      <td>${escapeHtml(r.memo||"")}</td>
      <td>
        <button onclick="startEdit(${r.id})">編集</button>
        <button onclick="deleteRecruit(${r.id})">削除</button>
      </td>`;
    }

    tbody.appendChild(tr);
  });
}

function startEdit(id){
  editingId = id;
  loadRecruits();
}

function cancelEdit(){
  editingId = null;
  loadRecruits();
}

async function saveEdit(id){
  const name = document.getElementById(`edit_name_${id}`).value;
  const store_id = document.getElementById(`edit_store_${id}`).value;
  const source = document.getElementById(`edit_source_${id}`).value;
  const status = document.getElementById(`edit_status_${id}`).value;
  const start_date = document.getElementById(`edit_date_${id}`).value;
  const memo = document.getElementById(`edit_memo_${id}`).value;

  const { error } = await client
    .from("recruits")
    .update({name,store_id,source,status,start_date,memo})
    .eq("id",id);

  if(error){
    alert("更新失敗");
    console.error(error);
    return;
  }

  editingId=null;
  loadRecruits();
}

async function deleteRecruit(id){
  if(!confirm("削除しますか？")) return;

  const { error } = await client
    .from("recruits")
    .delete()
    .eq("id", id);

  if(error){
    alert("削除失敗");
    console.error(error);
    return;
  }

  loadRecruits();
}

document.getElementById("recruitForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const store_id = document.getElementById("store").value;
  const source = document.getElementById("source").value;
  const status = document.getElementById("status").value;
  const start_date = document.getElementById("start_date").value;
  const memo = document.getElementById("memo").value;

  const { error } = await client
    .from("recruits")
    .insert({name,store_id,source,status,start_date,memo});

  if(error){
    alert("登録失敗");
    console.error(error);
    return;
  }

  document.getElementById("recruitForm").reset();
  loadRecruits();
});

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

(async function init(){
  await loadStores();
  await loadRecruits();
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>採用管理システム</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
padding:30px;
}

h1{
margin-bottom:20px;
}

button{
padding:8px 12px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#eee;
}

form{
background:white;
padding:20px;
margin-bottom:20px;
}

input,select{
padding:6px;
margin-right:10px;
}
</style>

</head>
<body>

<h1>採用管理システム</h1>

<form id="recruitForm">

<input id="name" placeholder="氏名" required>

<select id="store"></select>

<select id="source">
<option value="飲食店.com">飲食店.com</option>
<option value="クックビズ">クックビズ</option>
</select>

<select id="status">
<option value="内定">内定</option>
<option value="承諾">承諾</option>
<option value="辞退">辞退</option>
</select>

<input type="date" id="start_date">

<input id="memo" placeholder="メモ">

<button type="submit">登録</button>

</form>

<table>

<thead>
<tr>
<th>氏名</th>
<th>店舗</th>
<th>媒体</th>
<th>ステータス</th>
<th>入社予定</th>
<th>メモ</th>
</tr>
</thead>

<tbody id="recruitList"></tbody>

</table>

<script>

const SUPABASE_URL = "ここにURL";
const SUPABASE_KEY = "ここにKEY";

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function loadStores(){

const {data} = await client.from("stores").select("*");

const select = document.getElementById("store");

select.innerHTML="";

data.forEach(store=>{

const option=document.createElement("option");

option.value=store.id;
option.textContent=store.name;

select.appendChild(option);

});

}

async function loadRecruits(){

const {data} = await client
.from("recruits")
.select("*,stores(name)");

const tbody=document.getElementById("recruitList");

tbody.innerHTML="";

data.forEach(r=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${r.name||""}</td>
<td>${r.stores?.name||""}</td>
<td>${r.source||""}</td>
<td>${r.status||""}</td>
<td>${r.start_date||""}</td>
<td>${r.memo||""}</td>
`;

tbody.appendChild(tr);

});

}

document.getElementById("recruitForm").addEventListener("submit",async e=>{

e.preventDefault();

const name=document.getElementById("name").value;
const store_id=document.getElementById("store").value;
const source=document.getElementById("source").value;
const status=document.getElementById("status").value;
const start_date=document.getElementById("start_date").value;
const memo=document.getElementById("memo").value;

await client.from("recruits").insert({
name,
store_id,
source,
status,
start_date,
memo
});

loadRecruits();

});

loadStores();
loadRecruits();

</script>

</body>
</html>

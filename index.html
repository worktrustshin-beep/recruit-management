<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用管理システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
  margin:0;
}

h1{
  margin:0 0 20px 0;
  font-size:24px;
}

.wrap{
  background:#fff;
  padding:20px;
  margin-bottom:20px;
}

form{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
}

input, select, button{
  padding:10px 12px;
  font-size:14px;
  box-sizing:border-box;
}

input[type="text"], input[type="date"], select{
  min-width:160px;
}

button{
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
  vertical-align:middle;
}

th{
  background:#eee;
}

.action-buttons{
  display:flex;
  gap:8px;
}

.edit-btn{
  background:#f3f3f3;
  border:1px solid #bbb;
}

.delete-btn{
  background:#fff0f0;
  border:1px solid #d88;
}

#cancelEditBtn{
  display:none;
}

.status-text{
  font-weight:600;
}

@media screen and (max-width: 768px){
  form{
    flex-direction:column;
    align-items:stretch;
  }

  input[type="text"], input[type="date"], select, button{
    width:100%;
  }

  .table-wrap{
    overflow-x:auto;
  }

  table{
    min-width:1000px;
  }
}
</style>
</head>
<body>

<h1>採用管理システム</h1>

<div class="wrap">
  <form id="recruitForm">
    <input id="name" type="text" placeholder="氏名" required>

    <select id="store" required></select>

    <select id="source">
      <option value="飲食店.com">飲食店.com</option>
      <option value="クックビズ">クックビズ</option>
    </select>

    <select id="status">
      <option value="内定">内定</option>
      <option value="承諾">承諾</option>
      <option value="辞退">辞退</option>
    </select>

    <input type="date" id="start_date">
    <input id="memo" type="text" placeholder="メモ">

    <button type="submit" id="submitBtn">登録</button>
    <button type="button" id="cancelEditBtn">キャンセル</button>
  </form>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>氏名</th>
        <th>店舗</th>
        <th>媒体</th>
        <th>ステータス</th>
        <th>入社予定</th>
        <th>メモ</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="recruitList"></tbody>
  </table>
</div>

<script>
const SUPABASE_URL = "https://brzdyerxpjsgltmufhkh.supabase.co";
const SUPABASE_KEY = "sb_publishable_81-lBmd-xm4Ayv9IwGBW5A_DIU-U6a9";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let editingId = null;

async function loadStores(){
  const { data, error } = await client
    .from("stores")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    alert("店舗の読み込みに失敗しました");
    console.error(error);
    return;
  }

  const select = document.getElementById("store");
  select.innerHTML = "";

  data.forEach(store => {
    const option = document.createElement("option");
    option.value = store.id;
    option.textContent = store.name;
    select.appendChild(option);
  });
}

async function loadRecruits(){
  const { data, error } = await client
    .from("recruits")
    .select(`
      id,
      name,
      source,
      status,
      start_date,
      memo,
      store_id,
      stores(name)
    `)
    .order("id", { ascending: false });

  if (error) {
    alert("採用データの読み込みに失敗しました");
    console.error(error);
    return;
  }

  const tbody = document.getElementById("recruitList");
  tbody.innerHTML = "";

  data.forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${escapeHtml(r.name || "")}</td>
      <td>${escapeHtml(r.stores?.name || "")}</td>
      <td>${escapeHtml(r.source || "")}</td>
      <td><span class="status-text">${escapeHtml(r.status || "")}</span></td>
      <td>${escapeHtml(r.start_date || "")}</td>
      <td>${escapeHtml(r.memo || "")}</td>
      <td>
        <div class="action-buttons">
          <button type="button" class="edit-btn" onclick="startEdit(${r.id}, ${r.store_id ?? 'null'}, '${jsSafe(r.name || "")}', '${jsSafe(r.source || "")}', '${jsSafe(r.status || "")}', '${jsSafe(r.start_date || "")}', '${jsSafe(r.memo || "")}')">編集</button>
          <button type="button" class="delete-btn" onclick="deleteRecruit(${r.id})">削除</button>
        </div>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

function startEdit(id, storeId, name, source, status, startDate, memo){
  editingId = id;

  document.getElementById("name").value = name;
  document.getElementById("store").value = storeId ?? "";
  document.getElementById("source").value = source;
  document.getElementById("status").value = status;
  document.getElementById("start_date").value = startDate;
  document.getElementById("memo").value = memo;

  document.getElementById("submitBtn").textContent = "更新";
  document.getElementById("cancelEditBtn").style.display = "inline-block";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetForm(){
  editingId = null;
  document.getElementById("recruitForm").reset();
  document.getElementById("submitBtn").textContent = "登録";
  document.getElementById("cancelEditBtn").style.display = "none";
}

async function deleteRecruit(id){
  const ok = confirm("このデータを削除しますか？");
  if (!ok) return;

  const { error } = await client
    .from("recruits")
    .delete()
    .eq("id", id);

  if (error) {
    alert("削除に失敗しました");
    console.error(error);
    return;
  }

  if (editingId === id) {
    resetForm();
  }

  await loadRecruits();
}

document.getElementById("recruitForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const store_id = Number(document.getElementById("store").value);
  const source = document.getElementById("source").value;
  const status = document.getElementById("status").value;
  const start_date = document.getElementById("start_date").value || null;
  const memo = document.getElementById("memo").value.trim();

  if (!name) {
    alert("氏名を入力してください");
    return;
  }

  const payload = {
    name,
    store_id,
    source,
    status,
    start_date,
    memo
  };

  let error = null;

  if (editingId === null) {
    const result = await client.from("recruits").insert(payload);
    error = result.error;
  } else {
    const result = await client
      .from("recruits")
      .update(payload)
      .eq("id", editingId);
    error = result.error;
  }

  if (error) {
    alert(editingId === null ? "登録に失敗しました" : "更新に失敗しました");
    console.error(error);
    return;
  }

  resetForm();
  await loadRecruits();
});

document.getElementById("cancelEditBtn").addEventListener("click", () => {
  resetForm();
});

function escapeHtml(str){
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function jsSafe(str){
  return str
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/\n/g, "\\n")
    .replace(/\r/g, "");
}

(async function init(){
  await loadStores();
  await loadRecruits();
})();
</script>

</body>
</html>
